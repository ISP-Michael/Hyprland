
general {
  no_fade_in = true
  grace = 0
  disable_loading = true
}

background {
  monitor =
  path = /home/Michael/.config/hypr/background.png
  blur_passes = 3
  contrast = 0.8
  brightness = 0.5
}

# --- ЦЕНТР (ВРЕМЯ И ДАТА) ---
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
  color = rgba(255, 255, 255, 0.85)
  font_size = 92
  font_family = Montserrat Thin
  position = 0, 120
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] echo "$(date +"%A, %d %B" | tr '[:lower:]' '[:upper:]')"
  color = rgba(255, 255, 255, 0.55)
  font_size = 16
  font_family = Montserrat Light
  position = 0, 40
  halign = center
  valign = center
}

# --- ИНПУТ (МГНОВЕННЫЙ FAIL БЕЗ ТЕКСТА) ---
input-field {
  monitor =
  size = 320, 40
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.3
  dots_center = true
  outer_color = rgba(255, 255, 255, 0.1)
  inner_color = rgba(0, 0, 0, 0.2)
  font_color = rgb(200, 200, 200)
  fade_on_empty = false
  placeholder_text = 
  hide_input = false
  
  # Настройки индикации ошибки
  check_color = rgba(255, 255, 255, 0.2)
  fail_color = rgba(255, 0, 0, 1.0)
  fail_text = 
  fail_timeout = 0
  fail_transition = 0
  
  position = 0, -60
  halign = center
  valign = center
}

# РАСКЛАДКА
label {
  monitor =
  text = $LAYOUT
  color = rgba(255, 255, 255, 0.4)
  font_size = 12
  font_family = Montserrat
  position = 0, -105
  halign = center
  valign = center
}

# --- ЛЕВЫЙ НИЖНИЙ УГОЛ (СИСТЕМА С БАРАМИ) ---

# БАТАРЕЯ
label {
  monitor =
  text = cmd[update:1000] echo "BATT $(cat /sys/class/power_supply/BAT*/capacity | awk '{printf "%.2f", $1/100}') $(cat /sys/class/power_supply/BAT*/status | tr '[:lower:]' '[:upper:]')"
  color = rgba(255, 255, 255, 0.5)
  font_size = 12.5
  font_family = Montserrat Light
  position = 30, 105
  halign = left
  valign = bottom
}

label {
  monitor =
  text = cmd[update:1000] echo "$(cat /sys/class/power_supply/BAT*/capacity)" | awk '{ORS=""; for(i=0;i<$1/10;i++) print "—"; for(i=$1/10;i<10;i++) print "  "}'
  color = rgba(255, 255, 255, 0.3)
  font_size = 10
  position = 30, 95
  halign = left
  valign = bottom
}

# ЯРКОСТЬ
label {
  monitor =
  text = cmd[update:200] B=$(cat /sys/class/backlight/*/brightness | head -n1); M=$(cat /sys/class/backlight/*/max_brightness | head -n1); echo "$B $M" | awk '{printf "BRIG %.2f", $1/$2}'
  color = rgba(255, 255, 255, 0.5)
  font_size = 12.5
  font_family = Montserrat Light
  position = 30, 75
  halign = left
  valign = bottom
}

label {
  monitor =
  text = cmd[update:200] B=$(cat /sys/class/backlight/*/brightness | head -n1); M=$(cat /sys/class/backlight/*/max_brightness | head -n1); echo "$B $M" | awk '{v=$1*10/$2; ORS=""; for(i=0;i<v;i++) print "—"; for(i=v;i<10;i++) print "  "}'
  color = rgba(255, 255, 255, 0.3)
  font_size = 10
  position = 30, 65
  halign = left
  valign = bottom
}

# ЗВУК
label {
  monitor =
  text = cmd[update:200] wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print "VOLU", $2}'
  color = rgba(255, 255, 255, 0.5)
  font_size = 12.5
  font_family = Montserrat Light
  position = 30, 45
  halign = left
  valign = bottom
}

label {
  monitor =
  text = cmd[update:200] wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{v=$2*10; ORS=""; for(i=0;i<v;i++) print "—"; for(i=v;i<10;i++) print "  "}'
  color = rgba(255, 255, 255, 0.3)
  font_size = 10
  position = 30, 35
  halign = left
  valign = bottom
}
