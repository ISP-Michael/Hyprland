general {
  no_fade_in = true
  grace = 0
  disable_loading = true
}

background {
  monitor =
  path = /path/to/your/image.png
  blur_passes = 3
  contrast = 0.8
  brightness = 0.5
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
  color = rgba(255, 255, 255, 0.8)
  font_size = 86
  font_family = Montserrat Thin
  position = 0, 120
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] echo "$(date +"%A, %d %B" | tr '[:lower:]' '[:upper:]')"
  color = rgba(255, 255, 255, 0.5)
  font_size = 14
  font_family = Montserrat Light
  position = 0, 40
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 320, 40
  outline_thickness = 1
  dots_size = 0.2
  dots_spacing = 0.3
  dots_center = true
  outer_color = rgba(255, 255, 255, 0.1)
  inner_color = rgba(0, 0, 0, 0.2)
  font_color = rgb(200, 200, 200)
  fade_on_empty = true
  placeholder_text = 
  hide_input = false
  check_color = rgba(255, 255, 255, 0.2)
  fail_color = rgba(255, 50, 50, 0.3)
  position = 0, -60
  halign = center
  valign = center
}

label {
  monitor =
  text = $LAYOUT
  color = rgba(255, 255, 255, 0.3)
  font_size = 10
  font_family = Montserrat
  position = 0, -100
  halign = center
  valign = center
}

